<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Books Store</h1>
        <p>Read and Explore Amazing Books</p>
    </header>

    <section class="books-container">

        <div class="book-card">
            <img src="images/book1.jpg" alt="Book 1">
            <h2>Atomic Habits</h2>
            <p>Author: James Clear</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="images/book2.jpeg" alt="Book 2">
            <h2>Rich Dad Poor Dad</h2>
            <p>Author: Robert Kiyosaki</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="images/book3.jpeg" alt="Book 3">
            <h2>The Alchemist</h2>
            <p>Author: Paulo Coelho</p>
            <button>Buy Now</button>
        </div>

        <div class="book-card">
            <img src="images/book4.jpeg" alt="Book 4">
            <h2>Think and Grow Rich</h2>
            <p>Author: Napoleon Hill</p>
            <button>Buy Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 My Books Store</p>
    </footer>

</body>
</html>
